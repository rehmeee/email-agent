name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Build
    runs-on: ubuntu-latest

    env:
      # Dummy values so `next build` can run in CI without real secrets.
      # Real secrets live in Vercel → Project → Settings → Environment Variables.
      AUTH_SECRET: ci-build-secret-must-be-at-least-32-characters-long
      AUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ci-dummy-google-client-id
      GOOGLE_CLIENT_SECRET: ci-dummy-google-client-secret
      OPENROUTER_API_KEY: ci-dummy-openrouter-key
      OPENROUTER_MODEL: openai/gpt-4o-mini

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
