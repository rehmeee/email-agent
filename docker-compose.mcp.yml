# Local / self-hosted google_workspace_mcp for MailMind.
# Builds YOUR image from Dockerfile.mcp (no Hub/GHCR pull of upstream).
#
#   npm run mcp:docker          # build + run locally
#   npm run mcp:image           # build image only
#   npm run mcp:image -- --push YOURUSER/mailmind-workspace-mcp:latest
#
# App env: WORKSPACE_MCP_URL=http://localhost:8000/mcp  (or your container URL)
services:
  workspace-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    image: mailmind-workspace-mcp:latest
    ports:
      - "8000:8000"
    environment:
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MCP_ENABLE_OAUTH21: "true"
      EXTERNAL_OAUTH21_PROVIDER: "true"
      WORKSPACE_MCP_STATELESS_MODE: "true"
      OAUTHLIB_INSECURE_TRANSPORT: "1"
    command:
      [
        "--transport",
        "streamable-http",
        "--tools",
        "gmail",
        "drive",
        "calendar",
        "sheets",
        "docs",
        "contacts",
        "--tool-tier",
        "extended",
      ]
    restart: unless-stopped
